name: Design System Auto-Sync

# Runs every day at 9am UTC
# Also can be triggered manually anytime
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      description:
        description: 'Optional: describe what changed'
        required: false
        default: 'Manual sync triggered'

jobs:
  sync-design-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install node-fetch
        run: npm install node-fetch@3 --save-dev --silent

      - name: Fetch Figma pages and detect changes
        id: figma_sync
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: 6kHkKTxW1ygct6vTQsIGF1
        run: |
          node --input-type=module << 'EOF'
          import fetch from 'node-fetch';
          import fs from 'fs';
          import crypto from 'crypto';

          const FILE_KEY = process.env.FIGMA_FILE_KEY;
          const TOKEN = process.env.FIGMA_TOKEN;

          const WATCHED_PAGES = {
            id_visual:         '0:1',
            design_components: '7:44649',
            images:            '145:5528'
          };

          async function fetchFigmaPage(pageId) {
            const id = pageId.replace(':', '-');
            const res = await fetch(
              `https://api.figma.com/v1/files/${FILE_KEY}/nodes?ids=${id}&depth=3`,
              { headers: { 'X-Figma-Token': TOKEN } }
            );
            return res.json();
          }

          function hashContent(data) {
            return crypto.createHash('sha256')
              .update(JSON.stringify(data))
              .digest('hex')
              .slice(0, 12);
          }

          async function main() {
            let storedHashes = {};
            try {
              const meta = JSON.parse(fs.readFileSync('figma/components.json', 'utf8'))._meta;
              storedHashes = meta.page_hashes || {};
            } catch(e) {
              console.log('No stored hashes — first run');
            }

            console.log('Stored hashes:', JSON.stringify(storedHashes));

            const newHashes = {};
            const changedPages = [];

            for (const [name, pageId] of Object.entries(WATCHED_PAGES)) {
              console.log(`Fetching ${name} (${pageId})...`);
              const data = await fetchFigmaPage(pageId);
              if (data.err) { console.error(`Error: ${data.err}`); continue; }

              const hash = hashContent(data.nodes);
              newHashes[name] = hash;
              console.log(`  ${name}: ${hash} (stored: ${storedHashes[name] || 'none'})`);

              if (hash !== storedHashes[name]) {
                changedPages.push({ name, id: pageId, oldHash: storedHashes[name] || 'none', newHash: hash });
              }
            }

            if (changedPages.length === 0) {
              console.log('NO_CHANGES');
              fs.writeFileSync('/tmp/sync_result.txt', 'NO_CHANGES');
            } else {
              console.log('CHANGES_DETECTED in: ' + changedPages.map(p => p.name).join(', '));
              fs.writeFileSync('/tmp/sync_result.txt', 'CHANGES_DETECTED');
              fs.writeFileSync('/tmp/changed_pages.json', JSON.stringify(changedPages, null, 2));
              fs.writeFileSync('/tmp/new_hashes.json', JSON.stringify(newHashes, null, 2));
            }
          }

          main().catch(e => {
            console.error('Fatal:', e);
            fs.writeFileSync('/tmp/sync_result.txt', 'ERROR');
          });
          EOF

      - name: Check result
        id: check
        run: |
          RESULT=$(cat /tmp/sync_result.txt)
          echo "result=${RESULT}" >> $GITHUB_OUTPUT
          echo "Sync result: ${RESULT}"

      - name: Update hashes in JSON files
        if: steps.check.outputs.result == 'CHANGES_DETECTED'
        run: |
          TODAY=$(date +'%Y-%m-%d')
          node -e "
            const fs = require('fs');
            const hashes = JSON.parse(fs.readFileSync('/tmp/new_hashes.json', 'utf8'));
            ['figma/components.json', 'figma/images.json'].forEach(path => {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              data._meta.last_updated = '${TODAY}';
              data._meta.page_hashes = hashes;
              data._meta.sync_note = 'Auto-detected change on ${TODAY} — review and update manually if needed';
              fs.writeFileSync(path, JSON.stringify(data, null, 2));
              console.log('Updated', path);
            });
          "

      - name: Create PR branch and commit
        if: steps.check.outputs.result == 'CHANGES_DETECTED'
        id: branch
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          BRANCH="design-system/auto-sync-${DATE}"
          echo "name=${BRANCH}" >> $GITHUB_OUTPUT

          git config user.name "Claude DesignOps"
          git config user.email "claude-designops@astropay.com"
          git checkout -b ${BRANCH}
          git add figma/components.json figma/images.json
          git commit -m "chore: Figma page change detected — review required (${DATE})"
          git push origin ${BRANCH}

      - name: Open Pull Request
        if: steps.check.outputs.result == 'CHANGES_DETECTED'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CLAUDE_PAT }}
          script: |
            const fs = require('fs');
            const changedPages = JSON.parse(fs.readFileSync('/tmp/changed_pages.json', 'utf8'));

            const pageLinks = {
              id_visual:         'https://www.figma.com/design/6kHkKTxW1ygct6vTQsIGF1/Claude-lab?node-id=0-1',
              design_components: 'https://www.figma.com/design/6kHkKTxW1ygct6vTQsIGF1/Claude-lab?node-id=7-44649',
              images:            'https://www.figma.com/design/6kHkKTxW1ygct6vTQsIGF1/Claude-lab?node-id=145-5528'
            };

            const pageLabels = {
              id_visual:         'Visual Identity (0:1)',
              design_components: 'Design Components (7:44649)',
              images:            'Images Library (145:5528)'
            };

            const changedList = changedPages
              .map(p => `- **[${pageLabels[p.name]}](${pageLinks[p.name]})** — hash: \`${p.oldHash}\` → \`${p.newHash}\``)
              .join('\n');

            const checklistItems = changedPages.map(p => {
              if (p.name === 'id_visual') return [
                '#### Visual Identity changed',
                '- [ ] Colors updated? → `tokens/brand.json` → `color`',
                '- [ ] Typography updated? → `tokens/brand.json` → `typography`',
                '- [ ] Logo or wordmark changed? → `BRAND.md`'
              ].join('\n');

              if (p.name === 'design_components') return [
                '#### Design Components changed',
                '- [ ] New components added? → add node IDs to `figma/components.json`',
                '- [ ] Components renamed or moved? → update node IDs',
                '- [ ] New ad template layouts? → `figma/components.json` → `ad_templates`',
                '- [ ] CTA variants changed? → `figma/components.json` → `components.cta.variants`',
                '- [ ] Store badges changed? → `figma/components.json` → `components.store_badges`'
              ].join('\n');

              if (p.name === 'images') return [
                '#### Images Library changed',
                '- [ ] New images added? → add to correct category in `figma/images.json`',
                '- [ ] Images removed? → remove from `figma/images.json`',
                '- [ ] New exchange mockups? → `figma/images.json` → `exchange_campaign`',
                '- [ ] Image names changed? → update exact names (findOne uses exact name)'
              ].join('\n');

              return '';
            }).join('\n\n');

            const prBody = [
              '## Figma Design System Change Detected',
              '',
              'The following watched pages changed since the last sync:',
              '',
              changedList,
              '',
              '---',
              '',
              '### Review checklist',
              '',
              checklistItems,
              '',
              '---',
              '',
              '### Figma links',
              '| Page | Link |',
              '|---|---|',
              `| Visual Identity | [Open](${pageLinks.id_visual}) |`,
              `| Design Components | [Open](${pageLinks.design_components}) |`,
              `| Images Library | [Open](${pageLinks.images}) |`,
              '',
              '---',
              '',
              '**Update the JSON files, check all boxes, then merge. Claude will use the updated data immediately.**'
            ].join('\n');

            const today = new Date().toISOString().split('T')[0];
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: Figma change detected in ${changedPages.length} page(s) — review required (${today})`,
              head: '${{ steps.branch.outputs.name }}',
              base: 'master',
              body: prBody
            });

            console.log('PR created:', pr.html_url);

      - name: No changes found
        if: steps.check.outputs.result == 'NO_CHANGES'
        run: echo "All 3 watched Figma pages are unchanged. No PR needed."
